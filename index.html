<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CS2 Map Veto</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #111419;
      --panel: #1a1f27;
      --text: #e9eef7;
      --muted: #9ca8bc;
      --accent: #4da3ff;
      --danger: #ff4d6d;
      --border: #2a3240;
      --success: #39d98a;
    }

    * {
      box-sizing: border-box;
      font-family: Inter, Segoe UI, Arial, sans-serif;
    }

    body {
      margin: 0;
      background: radial-gradient(circle at top, #1e2633 0%, var(--bg) 55%);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .app {
      width: min(1280px, 100%);
      background: color-mix(in srgb, var(--panel) 92%, black);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0 0 6px;
      font-size: clamp(1.2rem, 1rem + 1.2vw, 2rem);
    }

    .subtitle {
      margin: 0 0 16px;
      color: var(--muted);
    }

    .controls {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      margin-bottom: 16px;
    }

    .control {
      background: #161b23;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
    }

    .control label {
      display: block;
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      border: 1px solid var(--border);
      background: #10141b;
      color: var(--text);
      border-radius: 8px;
      padding: 8px 10px;
      outline: none;
    }

    input:focus {
      border-color: var(--accent);
    }

    .status {
      margin: 0 0 14px;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #141a22;
    }

    .status strong {
      color: var(--accent);
    }

    .map-grid {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      padding: 6px 2px 12px;
      justify-content: center;
    }

    button.map {
      border: 1px solid var(--border);
      background: #1b2230;
      color: var(--text);
      padding: 0;
      border-radius: 14px;
      cursor: pointer;
      transition: 0.2s ease;
      text-align: left;
      font-weight: 600;
      min-width: 132px;
      max-width: 132px;
      min-height: 244px;
      overflow: hidden;
      position: relative;
      isolation: isolate;
    }

    button.map:hover:not(:disabled) {
      transform: translateY(-3px);
      border-color: var(--accent);
    }

    button.map:disabled {
      cursor: not-allowed;
    }

    button.map.banned {
      border-color: #553140;
      background: #2f1921;
      color: #f8c6d2;
      opacity: 0.75;
    }

    button.map.decider {
      border-color: #39d98a;
      background: #1b2230;           /* обычный фон */
      color: var(--text);
      box-shadow: 0 0 0 3px rgba(57, 217, 138, 0.45);
      opacity: 1;                    /* полностью яркая */
    }

    .map-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #2f3b52, #1d2433);
      background-size: cover;
      background-position: center;
      z-index: -3;
      filter: brightness(1);         /* для decider будет ярче */
    }

    button.map.decider .map-image {
      filter: brightness(1.08) saturate(1.15); /* делаем decider чуть ярче и насыщеннее */
    }

    .map-overlay {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to top, rgba(8, 11, 16, 0.75) 25%, rgba(8, 11, 16, 0.35) 60%, rgba(8, 11, 16, 0.12) 100%),
        linear-gradient(to right, rgba(0, 0, 0, 0.15), transparent 65%);
      z-index: -2;
      pointer-events: none;
    }

    /* Для banned делаем темнее */
    button.map.banned .map-overlay {
      background:
        linear-gradient(to top, rgba(30, 5, 12, 0.92) 20%, rgba(30, 5, 12, 0.65) 55%, rgba(30, 5, 12, 0.35) 100%),
        linear-gradient(to right, rgba(55, 9, 20, 0.4), transparent 60%);
    }

    .map-top-badge {
      margin: 10px 10px 0;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 0.72rem;
      color: #f0f5ff;
      background: rgba(20, 25, 35, 0.66);
      border: 1px solid rgba(255, 255, 255, 0.14);
    }

    button.map.decider .map-top-badge {
      background: rgba(19, 66, 43, 0.9);
      border-color: #39d98a;
      color: #c9f8e1;
      font-weight: 700;
    }

    .map-title {
      display: block;
      margin-top: auto;
      padding: 0 10px 6px;
      font-size: 1.02rem;
      letter-spacing: 0.3px;
      font-weight: 800;
      text-transform: uppercase;
      text-shadow: 0 2px 5px rgba(0, 0, 0, 0.65);
    }

    .map-subtitle {
      display: block;
      padding: 0 10px 12px;
      color: #cfdaea;
      font-size: 0.78rem;
      text-shadow: 0 2px 5px rgba(0, 0, 0, 0.6);
    }

    .map-inner {
      min-height: 244px;
      display: flex;
      flex-direction: column;
    }

    button.map.banned .map-title,
    button.map.banned .map-subtitle {
      text-decoration: line-through;
      color: #ffd0db;
    }

    .footer {
      margin-top: 16px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-start;
    }

    .btn-reset {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #1a2230;
      color: var(--text);
      padding: 8px 12px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <main class="app">
    <h1>Шоуматч CS2 Map Veto</h1>
    <p class="subtitle">По очереди баньте карты, пока не останется decider.</p>

    <section class="controls">
      <div class="control">
        <label for="teamA">Команда A</label>
        <input id="teamA" value="Team A" maxlength="32" />
      </div>
      <div class="control">
        <label for="teamB">Команда B</label>
        <input id="teamB" value="Team B" maxlength="32" />
      </div>
    </section>

    <p id="status" class="status"></p>
    <section id="mapGrid" class="map-grid"></section>

    <div class="footer">
      <button id="resetBtn" class="btn-reset">Новая серия вето</button>
    </div>
  </main>

  <script>
    const mapPool = [
      "de_mirage",
      "de_overpass",
      "de_dust2",
      "de_train",
      "de_ancient",
      "de_inferno",
      "de_nuke",
      "de_anubis"
    ];

    const mapImages = {
      de_mirage: "https://files.bo3.gg/uploads/image/41377/image/webp-81fe4ce1e60e951d61e41a7b7dbfe8ee.webp",
      de_overpass: "https://pl.egw.news/_next/image?url=https%3A%2F%2Fegw.news%2Fuploads%2Fnews%2F1%2F17%2F1752661190633_1752661190633.webp&w=1920&q=75",
      de_dust2: "https://csmarket.gg/blog/wp-content/uploads/2024/04/Dust_II_CS-GO.webp",
      de_train: "https://cdn.sanity.io/images/6znhzi10/production/d72ebcffe297b573d921eb18436ecdf458aff188-1917x1054.jpg?w=1600&auto=format",
      de_ancient: "https://images.steamusercontent.com/ugc/2042997274847133077/8534B50A5A691EE7D3F1500E1CF03D41A37D03AC/?imw=5000&imh=5000&ima=fit&impolicy=Letterbox&imcolor=%23000000&letterbox=false",
      de_inferno: "https://i.redd.it/new-cs2-inferno-v0-5mdovmk0329b1.png?width=1920&format=png&auto=webp&s=0c085b6c9a4f1c855f5f22614d8ab60c25423180",
      de_nuke: "https://i.redd.it/nuke-cs1-vs-cs2-comparison-shots-v0-1rl0kalos29b1.png?width=2560&format=png&auto=webp&s=920e3cb3d15f245468c66ea1932211d6a538cfc9",
      de_anubis: "https://images.steamusercontent.com/ugc/2193876107321240926/4F3A2D9E8A51B390FC2B77407F9CBF0E60F555B9/?imw=5000&imh=5000&ima=fit&impolicy=Letterbox&imcolor=%23000000&letterbox=false"
    };

    const state = {
      currentTurn: 0,
      bannedMaps: [],
      decider: null
    };

    const teamAInput = document.getElementById("teamA");
    const teamBInput = document.getElementById("teamB");
    const mapGrid = document.getElementById("mapGrid");
    const status = document.getElementById("status");
    const resetBtn = document.getElementById("resetBtn");

    function activeTeams() {
      const teamA = teamAInput.value.trim() || "Team A";
      const teamB = teamBInput.value.trim() || "Team B";
      return [teamA, teamB];
    }

    function remainingMaps() {
      return mapPool.filter((map) => !state.bannedMaps.includes(map));
    }

    function updateStatus() {
      if (state.decider) {
        status.innerHTML = `Decider: <strong>${state.decider.replace("de_", "").toUpperCase()}</strong>`;
        return;
      }

      const teams = activeTeams();
      const currentTeam = teams[state.currentTurn % 2];
      status.innerHTML = `Сейчас банит: <strong>${currentTeam}</strong>`;
    }

    function banMap(mapName) {
      if (state.bannedMaps.includes(mapName) || state.decider) return;

      state.bannedMaps.push(mapName);
      state.currentTurn += 1;

      const left = remainingMaps();
      if (left.length === 1) {
        state.decider = left[0];
      }

      render();
    }

    function renderMaps() {
      mapGrid.innerHTML = "";

      mapPool.forEach((mapName) => {
        const btn = document.createElement("button");
        btn.className = "map";
        btn.type = "button";

        const inner = document.createElement("div");
        inner.className = "map-inner";

        const image = document.createElement("div");
        image.className = "map-image";
        if (mapImages[mapName]) {
          image.style.backgroundImage = `url("${mapImages[mapName]}")`;
        }

        const overlay = document.createElement("div");
        overlay.className = "map-overlay";

        const topBadge = document.createElement("span");
        topBadge.className = "map-top-badge";
        topBadge.textContent = "CS2 MAP";

        const title = document.createElement("span");
        title.className = "map-title";
        title.textContent = mapName.replace("de_", "").toUpperCase();

        const subtitle = document.createElement("span");
        subtitle.className = "map-subtitle";
        subtitle.textContent = mapName;

        inner.append(topBadge, title, subtitle);
        btn.append(image, overlay, inner);

        if (state.bannedMaps.includes(mapName)) {
          btn.classList.add("banned");
          btn.disabled = true;
        }

        if (state.decider === mapName) {
          btn.classList.add("decider");
          btn.disabled = true;
          topBadge.textContent = "DECIDER";
        }

        btn.addEventListener("click", () => banMap(mapName));
        mapGrid.appendChild(btn);
      });
    }

    function resetVeto() {
      state.currentTurn = 0;
      state.bannedMaps = [];
      state.decider = null;
      render();
    }

    function render() {
      renderMaps();
      updateStatus();
    }

    teamAInput.addEventListener("input", updateStatus);
    teamBInput.addEventListener("input", updateStatus);
    resetBtn.addEventListener("click", resetVeto);

    render();
  </script>
</body>
</html>
